<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1{ /*block-level*/
            background-color: lightcoral;
            height: 300px;
            width: 300px;
            
            border-width: 10px ;
            border-style: solid; 
            border-color: darkred;
            

            border: 10px solid darkred;
            
            padding-top: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            padding-left: 20px;

            padding: 20px ;

            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 20px;
            margin-left: 20px;

            margin: 20px auto 20px auto;

            outline-width:5px ;
            outline-style: dashed;
            outline-color: black;

            outline: 5px dashed black;
            
        }

        a{ /*inline-level*/
            border-width: 10px;
            border-style: solid;
            border-color:red ;

            border: 10px solid red;

            padding-top: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            padding-left: 20px;

            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Pargrafos tbm são exemplos de box-level mas os <a href="#">links também são exemplos de caixas inline-level</a>. Vamos ver como que funciona.</p>
</body>
</html>
