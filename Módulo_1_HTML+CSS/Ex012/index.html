<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video em HTML</title>
</head>
<body>
   <h1>Videos hospedados localmente </h1>
   <p>Este video esta hospedado localmente no meu propiro servidor</p> 
   <video width="500px" poster="Imagens/images.jpg" controls>
    <source src="Midia/Meu-video.mp4" type="video/mp4">
    <source src="Midia/Meu-video.ogv" type="video/ogg">
    <source src="Midia/Meu-video.webm"
     type="video/webm">
   </video>
   <h1>Inserindo videos do youtube(Esse é o melhor para economizar dados)</h1>
   <iframe width="500" height="315" src="https://www.youtube.com/embed/u_grICbLvPE?si=GgTMcTcko1HK6E65" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
   <h1>Inserindo videos do vimeo(muito bom para quando o dono quer que só pessoas espeficias vejam o video)</h1>
   <div style="padding:56.25% 0 0 0;position:relative;"><iframe src="https://player.vimeo.com/video/684357044?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="FOGO SUBTERRÂNEO // COLO DE DEUS"></iframe></div><script src="https://player.vimeo.com/api/player.js"></script>
</body>
</html>
